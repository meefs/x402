name: Publish all @x402/* packages to NPM

on:
  workflow_dispatch:

jobs:
  publish-npm-x402-all:
    if: github.repository == 'x402-foundation/x402' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@11.14.1 --ignore-scripts

      - name: Configure npm for trusted publishing
        run: npm config delete always-auth 2>/dev/null || true

      - name: Install dependencies
        working-directory: ./typescript
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build all @x402/* packages
        working-directory: ./typescript
        run: pnpm turbo run build --filter='@x402/*'

      - name: Publish all packages in release order
        working-directory: ./typescript
        run: |
          set -euo pipefail

          publish_package() {
            local package_dir="$1"

            cd "${package_dir}"

            local package_name package_version
            package_name="$(node -p "require('./package.json').name")"
            package_version="$(node -p "require('./package.json').version")"

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "=== Skipping ${package_name}@${package_version} (already published) ==="
              cd - >/dev/null
              return 0
            fi

            echo "=== Publishing ${package_name}@${package_version} ==="
            echo "Publishing to NPM (main branch)"
            pnpm publish --provenance --access public

            cd - >/dev/null
          }

          publish_package "packages/core"
          publish_package "packages/extensions"
          publish_package "packages/mechanisms/evm"
          publish_package "packages/mechanisms/svm"
          publish_package "packages/mechanisms/avm"
          publish_package "packages/mechanisms/aptos"
          publish_package "packages/mechanisms/stellar"
          publish_package "packages/mechanisms/hedera"
          publish_package "packages/mechanisms/keeta"
          publish_package "packages/mechanisms/near"
          publish_package "packages/mechanisms/tvm"
          publish_package "packages/mechanisms/xrpl"
          publish_package "packages/http/paywall"
          publish_package "packages/http/axios"
          publish_package "packages/http/fetch"
          publish_package "packages/http/express"
          publish_package "packages/http/hono"
          publish_package "packages/http/next"
          publish_package "packages/http/fastify"
          publish_package "packages/mcp"

          echo "=== All packages processed successfully ==="
